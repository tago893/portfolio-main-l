services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventseat
      POSTGRES_PASSWORD: eventseat
      POSTGRES_DB: eventseat
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventseat"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://eventseat:eventseat@postgres:5432/eventseat
      REDIS_URL: redis://redis:6379/0
      HOLD_TTL_SECONDS: 120
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m scripts.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
