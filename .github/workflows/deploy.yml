name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Vercel CLI
        run: bun add -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: bun run build

      - name: Generate build inspection report
        if: always()
        run: |
          mkdir -p build-inspection

          {
            echo "=== .vercel/output recursive listing ==="
            ls -laR .vercel/output 2>/dev/null || echo "No .vercel/output directory"
            echo
            echo "=== dist recursive listing ==="
            ls -laR dist 2>/dev/null || echo "No dist directory"
            echo
            echo "=== .output recursive listing ==="
            ls -laR .output 2>/dev/null || echo "No .output directory"
          } > build-inspection/listing.txt

          {
            echo "=== .vercel/output (find) ==="
            find .vercel/output -type f 2>/dev/null | sort || true
            echo
            echo "=== dist (find) ==="
            find dist -type f 2>/dev/null | sort || true
            echo
            echo "=== .output (find) ==="
            find .output -type f 2>/dev/null | sort || true
          } > build-inspection/files.txt

          # Copy key manifest/config files for quick inspection
          for f in \
            .vercel/output/config.json \
            .vercel/output/builds.json \
            .vercel/project.json \
            vercel.json; do
            if [ -f "$f" ]; then
              dest="build-inspection/$(echo "$f" | tr '/' '_')"
              cp "$f" "$dest"
            fi
          done

          # Copy any function .vc-config.json files
          find .vercel/output -name '.vc-config.json' 2>/dev/null | while read -r vc; do
            dest="build-inspection/vc-config_$(echo "$vc" | tr '/' '_').json"
            cp "$vc" "$dest"
          done

          echo "=== build-inspection contents ==="
          ls -la build-inspection
          cat build-inspection/listing.txt

      - name: Upload build inspection artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-inspection
          path: build-inspection
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Vercel output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vercel-output
          path: .vercel/output
          if-no-files-found: warn
          retention-days: 7

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-output
          path: |
            dist
            .output
          if-no-files-found: warn
          retention-days: 7

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Smoke test production URL
        run: |
          url="${{ steps.deploy.outputs.url }}"
          if [ -z "$url" ]; then
            echo "No deployment URL captured"
            exit 1
          fi

          echo "Smoke testing $url"
          # Retry up to 5 times to allow propagation
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /tmp/body.txt -w "%{http_code}" -L "$url" || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 5
          done

          echo "=== Response body (first 2KB) ==="
          head -c 2048 /tmp/body.txt || true
          echo

          if [ "$status" = "401" ]; then
            echo "FAIL: deployment is returning 401 (Vercel Deployment Protection is enabled)."
            echo "Disable it at: Vercel Project -> Settings -> Deployment Protection."
            exit 1
          fi
          if [ "$status" = "404" ]; then
            echo "FAIL: deployment is returning 404 (no matching route in .vercel/output)."
            exit 1
          fi
          echo "FAIL: unexpected status $status"
          exit 1

