name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build

      - name: Locate build output and prepare SPA fallback
        id: out
        run: |
          echo "Generated html files:"
          find . -maxdepth 4 \( -name index.html -o -name _shell.html \) -type f 2>/dev/null | sort | head -50

          for d in dist/client .output/client .output/public dist build/public; do
            if [ -f "$d/index.html" ] || [ -f "$d/_shell.html" ]; then
              echo "dir=$d" >> "$GITHUB_OUTPUT"
              # TanStack Start SPA mode emits _shell.html — use it as the SPA shell.
              if [ ! -f "$d/index.html" ] && [ -f "$d/_shell.html" ]; then
                cp "$d/_shell.html" "$d/index.html"
              fi
              [ -f "$d/404.html" ] || cp "$d/index.html" "$d/404.html"
              touch "$d/.nojekyll"
              ls -la "$d"
              exit 0
            fi
          done
          echo "No build output found. Debug tree:" >&2
          find dist -maxdepth 4 -type f 2>/dev/null | head -100 >&2 || true
          find .output -maxdepth 4 -type f 2>/dev/null | head -50 >&2 || true
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.out.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
