name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build

      - name: Locate build output and prepare SPA fallback
        id: out
        run: |
          for d in .output/public .output/client dist .output/static; do
            if [ -f "$d/index.html" ]; then
              echo "dir=$d" >> "$GITHUB_OUTPUT"
              touch "$d/.nojekyll"
              [ -f "$d/404.html" ] || cp "$d/index.html" "$d/404.html"
              ls -la "$d"
              exit 0
            fi
          done
          echo "No build output found" >&2
          ls -la .output 2>/dev/null || true
          ls -la dist 2>/dev/null || true
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.out.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
